# AppImageTools manifest для сборки Astrum AppImage
# Документация: https://docs.appimage.org/packaging-guide/from-source/native-binaries.html
#
# Примечание: appimagetool доступен в Alpine 3.21 testing репозитории.

appimage:
  name: Astrum
  version: ${VERSION}
  arch: ${ARCH}

build:
  base: alpine:3.21
  repositories:
    - v3.21/main
    - v3.21/community
    - v3.21/testing  # appimagetool доступен здесь
  
  dependencies:
    build:
      - vala
      - meson
      - ninja
      - build-base
      - glib-dev
      - gtk4.0-dev
      - libadwaita-dev
      - gettext
      - desktop-file-utils
      - git
      - curl
      - wget
      - fuse
      - fuse-dev
      - patchelf
      - mold
      - appimagetool  # Из testing репозитория
      - musl-dev
      - libgcc
      - libstdc++
      - glib-static
    
    runtime:
      - gtk4
      - libadwaita
      - glib
  
  tools:
    # linuxdeploy отсутствует в apk — загружаем вручную
    linuxdeploy:
      url: https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
      dest: /usr/local/bin/linuxdeploy
      chmod: +x
    
    linuxdeploy-plugin-gtk:
      url: https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/releases/download/continuous/linuxdeploy-plugin-gtk-x86_64.AppImage
      dest: /usr/local/bin/linuxdeploy-plugin-gtk
      chmod: +x

appdir:
  root: /workspace/AppDir
  
  structure:
    - path: usr/share/applications
    - path: usr/share/icons/hicolor/scalable/apps
    - path: usr/share/glib-2.0/schemas
    - path: usr/bin
  
  files:
    desktop:
      src: data/org.aetherde.Astrum.desktop
      dest: AppDir/usr/share/applications/
    
    icon:
      src: data/icons/org.aetherde.Astrum.svg
      dest: AppDir/usr/share/icons/hicolor/scalable/apps/
    
    gschema:
      src: data/gschemas.compiled
      dest: AppDir/usr/share/glib-2.0/schemas/
  
  apprun:
    script: |
      #!/bin/bash
      HERE="$(dirname "$(readlink -f "${0}")")"
      export GSETTINGS_SCHEMA_DIR="${HERE}/usr/share/glib-2.0/schemas"
      exec "${HERE}/usr/bin/astrum" "$@"

appimage:
  output: /workspace/artifacts/Astrum-${VERSION}-${ARCH}.AppImage
  
  linuxdeploy:
    appdir: AppDir
    plugin: gtk
    desktop-file: AppDir/org.aetherde.Astrum.desktop
    icon-file: AppDir/org.aetherde.Astrum.svg
    executable: AppDir/usr/bin/astrum
    exclude-libraries:
      - libc.so.6
      - libm.so.6
      - libpthread.so.0
      - libgcc_s.so.1
      - libstdc++.so.6
      - libglib-2.0.so.0
      - libgobject-2.0.so.0
      - libgio-2.0.so.0
  
  appimagetool:
    compression: zstd
    mksquashfs-opts:
      - -Xcompression-level
      - "9"
    source: AppDir
    output: ${output}

linking:
  # Гибридная линковка для Alpine/musl
  static:
    - musl libc
    - libgcc
  
  dynamic:
    - GTK4
    - LibAdwaita
    - GLib
    - Pango
    - Cairo
  
  flags:
    c_args:
      - -march=x86-64-v3
      - -O2
      - -flto=auto
      - -ffat-lto-objects
      - -g
    
    c_link_args:
      - -fuse-ld=mold
      - -flto=auto
      - -static-libgcc
      - -Wl,-Bstatic
      - -lc
      - -Wl,-Bdynamic
      - -Wl,-O2
      - -Wl,--gc-sections
      - -g

compatibility:
  # AppImage с musl libc работает на любых Linux дистрибутивах
  tested:
    - Alpine Linux 3.21
    - Arch Linux
    - Fedora 40+
    - Debian 12+
    - Ubuntu 24.04+
  
  requirements:
    - FUSE (для запуска AppImage v2)
    - kernel >= 4.0
