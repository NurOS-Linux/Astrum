# CI/CD для сборки и публикации пакетов Astrum
# Сборка .deb (Debian/Ubuntu), .rpm (Fedora), .pkg.zst (Arch Linux)
# Публикация в GitHub Releases при создании тега

name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'      # Release теги: v1.0.0, v1.2.3, etc.
      - 'v*.*.*-rc*'  # Pre-release теги: v1.0.0-rc1, v1.2.3-rc2, etc.

permissions:
  contents: read           # Для checkout
  id-token: write          # Для actions/attest@v4 (Sigstore OIDC)
  attestations: write      # Для загрузки аттестаций
  artifact-metadata: write # Для storage records

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Сборка всех типов пакетов
  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      deb_status: ${{ steps.build-deb.outcome }}
      rpm_status: ${{ steps.build-rpm.outcome }}
      pacman_status: ${{ steps.build-pacman.outcome }}
      appimage_status: ${{ steps.build-appimage.outcome }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            podman \
            python3-pip \
            pigz \
            slirp4netns \
            crun
          # Установка свежей версии podman-compose (через pip)
          # Системная версия старая и не поддерживает профили
          pip3 install --user --upgrade podman-compose

      - name: Setup podman
        run: |
          # Настройка podman для работы без root
          mkdir -p ~/.config/containers
          cat > ~/.config/containers/containers.conf << EOF
          [containers]
          netns="host"
          userns="host"
          ipcns="host"
          utsns="host"
          cgroupns="host"
          cgroups="disabled"
          log_driver = "k8s-file"
          EOF

      - name: Create artifacts directory
        run: mkdir -p artifacts

      # Сборка .deb
      - name: Build .deb package
        id: build-deb
        continue-on-error: true
        run: |
          echo "=== Starting .deb build at $(date) ==="
          VERSION=${{ steps.get_version.outputs.version }}
          export VERSION=${VERSION}

          echo "Building and running deb-builder..."
          podman-compose -f docker-compose.yml run --rm deb-builder 2>&1 || true
          
          # Копируем артефакты из docker volume
          podman run --rm -v artifacts:/src -v ${{ github.workspace }}/artifacts:/out \
            alpine sh -c "cp -r /src/* /out/ || true" 2>/dev/null || true

          echo "Contents of ./artifacts after build:"
          ls -la ./artifacts/ || true

          echo "=== .deb build completed at $(date) ==="
          ls -la ./artifacts/*.deb 2>/dev/null || echo "No .deb artifacts found"

      # Сборка .rpm
      - name: Build .rpm package
        id: build-rpm
        continue-on-error: true
        run: |
          echo "=== Starting .rpm build at $(date) ==="
          VERSION=${{ steps.get_version.outputs.version }}
          export VERSION=${VERSION}

          echo "Building and running rpm-builder..."
          podman-compose -f docker-compose.yml run --rm rpm-builder 2>&1 || true
          
          # Копируем артефакты из docker volume
          podman run --rm -v artifacts:/src -v ${{ github.workspace }}/artifacts:/out \
            alpine sh -c "cp -r /src/* /out/ || true" 2>/dev/null || true

          echo "Contents of ./artifacts after build:"
          ls -la ./artifacts/ || true

          echo "=== .rpm build completed at $(date) ==="
          ls -la ./artifacts/*.rpm 2>/dev/null || echo "No .rpm artifacts found"

      # Сборка .pacman
      - name: Build .pacman package
        id: build-pacman
        continue-on-error: true
        run: |
          echo "=== Starting .pacman build at $(date) ==="
          VERSION=${{ steps.get_version.outputs.version }}
          export VERSION=${VERSION}

          echo "Building and running pkg-builder..."
          podman-compose -f docker-compose.yml run --rm pkg-builder 2>&1 || true
          
          # Копируем артефакты из docker volume
          podman run --rm -v artifacts:/src -v ${{ github.workspace }}/artifacts:/out \
            alpine sh -c "cp -r /src/* /out/ || true" 2>/dev/null || true

          echo "Contents of ./artifacts after build:"
          ls -la ./artifacts/ || true

          echo "=== .pacman build completed at $(date) ==="
          ls -la ./artifacts/*.pacman 2>/dev/null || echo "No .pacman artifacts found"

      # Сборка .AppImage
      - name: Build .AppImage package
        id: build-appimage
        continue-on-error: true
        run: |
          echo "=== Starting .AppImage build at $(date) ==="
          VERSION=${{ steps.get_version.outputs.version }}
          export VERSION=${VERSION}

          echo "Building and running appimage-builder..."
          podman-compose -f docker-compose.yml run --rm appimage-builder 2>&1 || true
          
          # Копируем артефакты из docker volume
          podman run --rm -v artifacts:/src -v ${{ github.workspace }}/artifacts:/out \
            alpine sh -c "cp -r /src/* /out/ || true" 2>/dev/null || true

          echo "Contents of ./artifacts after build:"
          ls -la ./artifacts/ || true

          echo "=== .AppImage build completed at $(date) ==="
          ls -la ./artifacts/*.AppImage 2>/dev/null || echo "No .AppImage artifacts found"

      # Генерация attestation.json
      - name: Generate attestation.json
        id: generate-attestation
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          TAG=${{ steps.get_version.outputs.tag }}
          COMMIT_SHA=${{ github.sha }}
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUNNER="ubuntu-latest"
          
          # Функция для вычисления SHA256
          get_sha256() {
            if [ -f "$1" ]; then
              sha256sum "$1" | awk '{print $1}'
            else
              echo "not_found"
            fi
          }
          
          # Статусы сборок
          DEB_STATUS="${{ steps.build-deb.outcome }}"
          RPM_STATUS="${{ steps.build-rpm.outcome }}"
          PACMAN_STATUS="${{ steps.build-pacman.outcome }}"
          APPIMAGE_STATUS="${{ steps.build-appimage.outcome }}"
          
          # Хеши артефактов
          DEB_FILE=$(ls ./artifacts/*.deb 2>/dev/null | head -1)
          RPM_FILE=$(ls ./artifacts/*.rpm 2>/dev/null | head -1)
          PACMAN_FILE=$(ls ./artifacts/*.pacman 2>/dev/null | head -1)
          APPIMAGE_FILE=$(ls ./artifacts/*.AppImage 2>/dev/null | head -1)
          
          DEB_SHA=$(get_sha256 "${DEB_FILE}")
          RPM_SHA=$(get_sha256 "${RPM_FILE}")
          PACMAN_SHA=$(get_sha256 "${PACMAN_FILE}")
          APPIMAGE_SHA=$(get_sha256 "${APPIMAGE_FILE}")
          
          # Генерация JSON
          cat > ./artifacts/attestation.json << EOF
          {
            "version": "${VERSION}",
            "tag": "${TAG}",
            "commit": "${COMMIT_SHA}",
            "buildDate": "${BUILD_DATE}",
            "runner": "${RUNNER}",
            "workflow": "${{ github.workflow }}",
            "runId": "${{ github.run_id }}",
            "packages": {
              "deb": {
                "status": "${DEB_STATUS}",
                "file": "$(basename ${DEB_FILE:-none})",
                "sha256": "${DEB_SHA}"
              },
              "rpm": {
                "status": "${RPM_STATUS}",
                "file": "$(basename ${RPM_FILE:-none})",
                "sha256": "${RPM_SHA}"
              },
              "pacman": {
                "status": "${PACMAN_STATUS}",
                "file": "$(basename ${PACMAN_FILE:-none})",
                "sha256": "${PACMAN_SHA}"
              },
              "appimage": {
                "status": "${APPIMAGE_STATUS}",
                "file": "$(basename ${APPIMAGE_FILE:-none})",
                "sha256": "${APPIMAGE_SHA}"
              }
            }
          }
          EOF
          
          echo "=== Generated attestation.json ==="
          cat ./artifacts/attestation.json

      # Официальная аттестация GitHub (actions/attest@v4)
      # Генерирует SLSA provenance аттестацию для всех артефактов
      - name: Attest build provenance
        id: attest
        uses: actions/attest@v4
        with:
          subject-path: |
            ./artifacts/*.deb
            ./artifacts/*.rpm
            ./artifacts/*.pacman
            ./artifacts/*.AppImage
          show-summary: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            artifacts/*
            ${{ steps.attest.outputs.bundle-path }}
          retention-days: 7

  # Создание релиза на GitHub
  create-release:
    name: Create GitHub Release
    needs: build-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Для создания релиза

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version and determine release type
        id: get_info
        run: |
          VERSION=${{ needs.build-packages.outputs.version }}
          TAG=${{ needs.build-packages.outputs.tag }}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

          # Определение pre-release по наличию -rc* в теге
          if [[ "${TAG}" == *"-rc"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "Release type: Pre-release"
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "Release type: Release"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: ./packages

      - name: List and verify packages
        run: |
          echo "=== Available packages ==="
          ls -la ./packages/
          
          echo ""
          echo "=== SHA256 checksums ==="
          sha256sum ./packages/* 2>/dev/null || echo "No packages found"
          
          echo ""
          echo "=== Attestation ==="
          cat ./packages/attestation.json 2>/dev/null || echo "No attestation.json found"

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${{ steps.get_info.outputs.version }}
          TAG=${{ steps.get_info.outputs.tag }}
          IS_PRERELEASE=${{ steps.get_info.outputs.prerelease }}
          
          # Статусы сборок
          DEB_STATUS="${{ needs.build-packages.outputs.deb_status }}"
          RPM_STATUS="${{ needs.build-packages.outputs.rpm_status }}"
          PACMAN_STATUS="${{ needs.build-packages.outputs.pacman_status }}"
          APPIMAGE_STATUS="${{ needs.build-packages.outputs.appimage_status }}"
          
          # Получение предыдущего тега
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          
          echo "## ${TAG}" > /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          
          # Определение типа релиза
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            echo "⚠️ **Pre-release** — тестовая версия для раннего доступа" >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
          fi
          
          # Статус сборок
          echo "## 🏗️ Build Status" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "| Package | Status |" >> /tmp/release_notes.md
          echo "|---------|--------|" >> /tmp/release_notes.md
          
          if [[ "${DEB_STATUS}" == "success" ]]; then
            echo "| .deb (Debian/Ubuntu) | ✅ Success |" >> /tmp/release_notes.md
          else
            echo "| .deb (Debian/Ubuntu) | ❌ Failed |" >> /tmp/release_notes.md
          fi
          
          if [[ "${RPM_STATUS}" == "success" ]]; then
            echo "| .rpm (Fedora/RHEL) | ✅ Success |" >> /tmp/release_notes.md
          else
            echo "| .rpm (Fedora/RHEL) | ❌ Failed |" >> /tmp/release_notes.md
          fi
          
          if [[ "${PACMAN_STATUS}" == "success" ]]; then
            echo "| .pacman (Arch Linux) | ✅ Success |" >> /tmp/release_notes.md
          else
            echo "| .pacman (Arch Linux) | ❌ Failed |" >> /tmp/release_notes.md
          fi
          
          if [[ "${APPIMAGE_STATUS}" == "success" ]]; then
            echo "| .AppImage (Universal) | ✅ Success |" >> /tmp/release_notes.md
          else
            echo "| .AppImage (Universal) | ❌ Failed |" >> /tmp/release_notes.md
          fi
          
          echo "" >> /tmp/release_notes.md
          
          # Проверка что хотя бы одна сборка успешна
          if [[ "${DEB_STATUS}" != "success" && "${RPM_STATUS}" != "success" && "${PACMAN_STATUS}" != "success" && "${APPIMAGE_STATUS}" != "success" ]]; then
            echo "⚠️ **Warning:** All builds failed! This release contains no packages." >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
          fi
          
          # Генерация changelog с группировкой
          echo "## 📝 Changes" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          
          # Получение коммитов и группировка по типам
          COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"%s" --reverse)
          
          # Категории
          FEATURES=""
          FIXES=""
          DOCS=""
          STYLE=""
          REFACTOR=""
          PERF=""
          TEST=""
          BUILD=""
          CI=""
          CHORE=""
          OTHER=""
          
          while IFS= read -r commit; do
            if [[ "${commit}" =~ ^feat(\(.+\))?:\ .* ]]; then
              FEATURES="${FEATURES}- ${commit}\n"
            elif [[ "${commit}" =~ ^fix(\(.+\))?:\ .* ]]; then
              FIXES="${FIXES}- ${commit}\n"
            elif [[ "${commit}" =~ ^docs(\(.+\))?:\ .* ]]; then
              DOCS="${DOCS}- ${commit}\n"
            elif [[ "${commit}" =~ ^style(\(.+\))?:\ .* ]]; then
              STYLE="${STYLE}- ${commit}\n"
            elif [[ "${commit}" =~ ^refactor(\(.+\))?:\ .* ]]; then
              REFACTOR="${REFACTOR}- ${commit}\n"
            elif [[ "${commit}" =~ ^perf(\(.+\))?:\ .* ]]; then
              PERF="${PERF}- ${commit}\n"
            elif [[ "${commit}" =~ ^test(\(.+\))?:\ .* ]]; then
              TEST="${TEST}- ${commit}\n"
            elif [[ "${commit}" =~ ^build(\(.+\))?:\ .* ]]; then
              BUILD="${BUILD}- ${commit}\n"
            elif [[ "${commit}" =~ ^ci(\(.+\))?:\ .* ]]; then
              CI="${CI}- ${commit}\n"
            elif [[ "${commit}" =~ ^chore(\(.+\))?:\ .* ]]; then
              CHORE="${CHORE}- ${commit}\n"
            else
              OTHER="${OTHER}- ${commit}\n"
            fi
          done <<< "${COMMITS}"
          
          # Вывод категорий
          if [ -n "${FEATURES}" ]; then
            echo "### ✨ Features" >> /tmp/release_notes.md
            echo -e "${FEATURES}" >> /tmp/release_notes.md
          fi
          
          if [ -n "${FIXES}" ]; then
            echo "### 🐛 Bug Fixes" >> /tmp/release_notes.md
            echo -e "${FIXES}" >> /tmp/release_notes.md
          fi
          
          if [ -n "${DOCS}" ]; then
            echo "### 📚 Documentation" >> /tmp/release_notes.md
            echo -e "${DOCS}" >> /tmp/release_notes.md
          fi
          
          if [ -n "${BUILD}" ]; then
            echo "### 📦 Build System" >> /tmp/release_notes.md
            echo -e "${BUILD}" >> /tmp/release_notes.md
          fi
          
          if [ -n "${CI}" ]; then
            echo "### ⚙️ CI/CD" >> /tmp/release_notes.md
            echo -e "${CI}" >> /tmp/release_notes.md
          fi
          
          if [ -n "${CHORE}" ]; then
            echo "### 🔧 Chores" >> /tmp/release_notes.md
            echo -e "${CHORE}" >> /tmp/release_notes.md
          fi
          
          if [ -n "${OTHER}" ]; then
            echo "### Other Changes" >> /tmp/release_notes.md
            echo -e "${OTHER}" >> /tmp/release_notes.md
          fi
          
          # Если ничего не найдено — выводим все коммиты
          if [ -z "${FEATURES}${FIXES}${DOCS}${STYLE}${REFACTOR}${PERF}${TEST}${BUILD}${CI}${CHORE}${OTHER}" ]; then
            echo "### All Changes" >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
          fi
          
          echo "" >> /tmp/release_notes.md
          echo "## 📦 Available Packages" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          
          if [[ "${DEB_STATUS}" == "success" ]]; then
            echo "| \`astrum_${VERSION}_amd64.deb\` | Debian 12+, Ubuntu 24.04+ |" >> /tmp/release_notes.md
          fi
          if [[ "${RPM_STATUS}" == "success" ]]; then
            echo "| \`astrum-${VERSION}-1.x86_64.rpm\` | Fedora 41+, RHEL 9+ |" >> /tmp/release_notes.md
          fi
          if [[ "${PACMAN_STATUS}" == "success" ]]; then
            echo "| \`astrum-${VERSION}-1-x86_64.pacman\` | Arch Linux |" >> /tmp/release_notes.md
          fi
          if [[ "${APPIMAGE_STATUS}" == "success" ]]; then
            echo "| \`Astrum-${VERSION}-x86_64.AppImage\` | Universal (Any Linux) |" >> /tmp/release_notes.md
          fi
          
          echo "" >> /tmp/release_notes.md
          echo "## 🚀 Installation" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          
          if [[ "${DEB_STATUS}" == "success" ]]; then
            echo "### Debian/Ubuntu" >> /tmp/release_notes.md
            echo '```bash' >> /tmp/release_notes.md
            echo "sudo apt install ./astrum_${VERSION}_amd64.deb" >> /tmp/release_notes.md
            echo '```' >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
          fi
          
          if [[ "${RPM_STATUS}" == "success" ]]; then
            echo "### Fedora/RHEL" >> /tmp/release_notes.md
            echo '```bash' >> /tmp/release_notes.md
            echo "sudo dnf install ./astrum-${VERSION}-1.x86_64.rpm" >> /tmp/release_notes.md
            echo '```' >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
          fi
          
          if [[ "${PACMAN_STATUS}" == "success" ]]; then
            echo "### Arch Linux" >> /tmp/release_notes.md
            echo '```bash' >> /tmp/release_notes.md
            echo "sudo pacman -U ./astrum-${VERSION}-1-x86_64.pacman" >> /tmp/release_notes.md
            echo '```' >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
          fi
          
          if [[ "${APPIMAGE_STATUS}" == "success" ]]; then
            echo "### Universal (Any Linux)" >> /tmp/release_notes.md
            echo '```bash' >> /tmp/release_notes.md
            echo "chmod +x ./Astrum-${VERSION}-x86_64.AppImage" >> /tmp/release_notes.md
            echo "./Astrum-${VERSION}-x86_64.AppImage" >> /tmp/release_notes.md
            echo '```' >> /tmp/release_notes.md
            echo "" >> /tmp/release_notes.md
          fi
          
          echo "" >> /tmp/release_notes.md
          echo "## 🔐 Attestation" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "This release includes an \`attestation.json\` file with SHA256 checksums for all packages." >> /tmp/release_notes.md
          echo "Verify package integrity:" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo '```bash' >> /tmp/release_notes.md
          echo "sha256sum -c attestation.json  # Extract checksums from JSON" >> /tmp/release_notes.md
          echo '```' >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "---" >> /tmp/release_notes.md
          echo "*Release created automatically by GitHub Actions*" >> /tmp/release_notes.md
          
          echo "=== Release Notes ==="
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_info.outputs.tag }}
          name: Astrum ${{ steps.get_info.outputs.tag }}
          body_path: /tmp/release_notes.md
          prerelease: ${{ steps.get_info.outputs.prerelease == 'true' }}
          generate_release_notes: false
          files: |
            ./packages/*.deb
            ./packages/*.rpm
            ./packages/*.pacman
            ./packages/*.AppImage
            ./packages/attestation.json
            ./packages/*.sigstore.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
