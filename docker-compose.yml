# Docker Compose для оркестрации сборки пакетов Astrum
# Используется для локальной сборки всех трёх типов пакетов

services:
  # Сборка .deb для Debian/Ubuntu
  deb-builder:
    build:
      context: .
      dockerfile: docker/deb.Dockerfile
      args:
        VERSION: ${VERSION:-0.0.1}
    container_name: astrum-deb-builder
    volumes:
      - ./artifacts:/workspace/artifacts
    platform: linux/amd64

  # Сборка .rpm для Fedora
  rpm-builder:
    build:
      context: .
      dockerfile: docker/rpm.Dockerfile
      args:
        VERSION: ${VERSION:-0.0.1}
    container_name: astrum-rpm-builder
    volumes:
      - ./artifacts:/workspace/artifacts
    platform: linux/amd64

  # Сборка .pacman для Arch Linux
  pkg-builder:
    build:
      context: .
      dockerfile: docker/pacman.Dockerfile
      args:
        VERSION: ${VERSION:-0.0.1}
    container_name: astrum-pkg-builder
    volumes:
      - ./artifacts:/workspace/artifacts
    platform: linux/amd64

  # Сборка .AppImage (универсальный пакет для Linux)
  appimage-builder:
    build:
      context: .
      dockerfile: docker/appimage.Dockerfile
      args:
        VERSION: ${VERSION:-0.0.1}
    container_name: astrum-appimage-builder
    volumes:
      - ./artifacts:/workspace/artifacts
    platform: linux/amd64

  # Превью сборки - запуск File Manager для тестирования
  # Контейнер не сохраняет артефакты, удаляется после завершения
  # Поддержка WSL2 (Windows 11) с Wayland/X11 и X410 (Windows)
  # Запуск от root с AppArmor профилем для безопасности
  test:
    build:
      context: .
      dockerfile: docker/test.Dockerfile
      args:
        XBPS_MIRROR: ${XBPS_MIRROR:-https://repo-fastly.voidlinux.org}
    container_name: astrum-test
    # X410 использует :0, WSLg использует :0 и wayland-0
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-wayland-0}
      - XDG_RUNTIME_DIR=/runtime
      - GDK_BACKEND=wayland,x11
      - GSK_RENDERER=cairo
      - GTK_A11Y=none
      - XBPS_MIRROR=${XBPS_MIRROR:-https://repo-fastly.voidlinux.org}
    # Проброс сокетов для графической подсистемы
    volumes:
      # X11 socket
      - /tmp/.X11-unix:/tmp/.X11-unix
      # WSLg Wayland socket и runtime
      - /mnt/wslg:/mnt/wslg:ro
      - ${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY:-wayland-0}:/runtime/${WAYLAND_DISPLAY:-wayland-0}
      # GPU acceleration (AMD/Intel/NVIDIA)
      - /dev/dri:/dev/dri
    # AppArmor профиль для ограничения доступа контейнера
    # Примечание: работает только на Linux с AppArmor
    security_opt:
      - apparmor=astrum-test
    # Запуск от root (требуется для AppArmor и работы с /dev/dri)
    network_mode: default
    # Контейнер не перезапускается - удаляется после закрытия приложения
    restart: "no"

volumes:
  artifacts:
